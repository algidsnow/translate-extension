<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    body { width: 300px; font-family: Arial, sans-serif; padding: 10px; }
    h3 { margin-top: 0; color: #4285f4; }
    .word-item { 
      background: #f1f1f1; 
      padding: 8px; 
      padding-right: 25px;
      margin-bottom: 8px; 
      border-radius: 5px; 
      border-left: 4px solid #4285f4;
      position: relative;
    }
    .delete-btn {
      position: absolute;
      top: 5px;
      right: 5px;
      background: #ff4d4d;
      color: white;
      border: none;
      border-radius: 50%;
      width: 18px;
      height: 18px;
      font-size: 12px;
      cursor: pointer;
      line-height: 1;
      padding: 0;
    }
    .delete-btn:hover { background: #cc0000; }
    .original { font-weight: bold; font-size: 14px; }
    .translated { color: #333; margin-top: 4px; }
    .date { font-size: 10px; color: #888; text-align: right; }
    .ipa { color: #666; font-style: italic; font-size: 12px; margin-left: 5px; }
    .word-type { 
      background: #e3f2fd; color: #1565c0; font-size: 10px; 
      padding: 1px 5px; border-radius: 3px; display: inline-block; 
      margin: 3px 0;
    }
    #clearBtn {
      background: #ff4d4d; color: white; border: none; 
      padding: 5px 10px; cursor: pointer; float: right; border-radius: 3px;
    }
  </style>
</head>
<body>
  <div style="display:flex; justify-content:space-between; align-items:center;">
    <h3>Kho Từ Vựng</h3>
    <button id="clearBtn">Xóa tất cả</button>
  </div>
  <div id="vocabContainer">
    </div>
  <script src="popup.js"></script>
</body>
</html>
