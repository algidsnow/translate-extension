<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    body { width: 320px; font-family: Arial, sans-serif; padding: 10px; }
    h3 { margin-top: 0; color: #4285f4; }
    .word-item { 
      background: #f1f1f1; 
      padding: 8px; 
      padding-right: 25px;
      margin-bottom: 8px; 
      border-radius: 5px; 
      border-left: 4px solid #4285f4;
      position: relative;
    }
    .word-item.related-word {
      border-left-color: #ff9800;
      background: #fff8e1;
      margin-left: 12px;
    }
    .related-group { overflow: hidden; }
    .related-group.collapsed { display: none; }
    .related-badge {
      background: #ff9800;
      color: white;
      font-size: 9px;
      padding: 1px 6px;
      border-radius: 8px;
      margin-left: 6px;
      vertical-align: middle;
    }
    .related-to-text {
      font-size: 9px;
      color: #999;
      margin-top: 2px;
    }
    .toggle-related {
      background: none; border: none; cursor: pointer;
      font-size: 11px; color: #ff9800; padding: 2px 0;
      margin-top: 4px; display: inline-block;
    }
    .toggle-related:hover { color: #e65100; }
    .toggle-related .arrow { display: inline-block; transition: transform 0.2s; }
    .toggle-related.expanded .arrow { transform: rotate(90deg); }
    .delete-btn {
      position: absolute;
      top: 5px;
      right: 5px;
      background: #ff4d4d;
      color: white;
      border: none;
      border-radius: 50%;
      width: 18px;
      height: 18px;
      font-size: 12px;
      cursor: pointer;
      line-height: 1;
      padding: 0;
    }
    .delete-btn:hover { background: #cc0000; }
    .original { font-weight: bold; font-size: 14px; }
    .translated { color: #333; margin-top: 4px; }
    .date { font-size: 10px; color: #888; text-align: right; }
    .ipa { color: #666; font-style: italic; font-size: 12px; margin-left: 5px; }
    .word-type { 
      background: #e3f2fd; color: #1565c0; font-size: 10px; 
      padding: 1px 5px; border-radius: 3px; display: inline-block; 
      margin: 3px 0;
    }
    #clearBtn {
      background: #ff4d4d; color: white; border: none; 
      padding: 5px 10px; cursor: pointer; border-radius: 3px; font-size: 12px;
    }
    #clearBtn:hover { background: #cc0000; }
    #knowledgeBtn {
      background: #7c4dff; color: white; border: none;
      padding: 5px 10px; cursor: pointer; border-radius: 3px; font-size: 12px;
    }
    #knowledgeBtn:hover { background: #651fff; }

    /* Knowledge Panel */
    .knowledge-panel { display: none; margin-bottom: 10px; }
    .knowledge-panel.show { display: block; }
    .k-topic {
      background: #f5f5f5; border: 1px solid #ddd; border-radius: 6px;
      margin-bottom: 6px; overflow: hidden;
    }
    .k-topic-header {
      padding: 8px 10px; cursor: pointer; font-weight: bold; font-size: 12px;
      display: flex; justify-content: space-between; align-items: center;
      user-select: none;
    }
    .k-topic-header:hover { background: #eee; }
    .k-topic-header .k-arrow { transition: transform 0.2s; font-size: 10px; }
    .k-topic.open .k-arrow { transform: rotate(90deg); }
    .k-topic-body { display: none; padding: 0 10px 8px; }
    .k-topic.open .k-topic-body { display: block; }
    .k-section {
      border-radius: 6px; padding: 8px 10px; margin-bottom: 6px;
      border-left: 4px solid;
    }
    .k-section.noun { background: #e3f2fd; border-color: #1565c0; }
    .k-section.verb { background: #e8f5e9; border-color: #2e7d32; }
    .k-section.adj { background: #fff8e1; border-color: #f57f17; }
    .k-section.adv { background: #f3e5f5; border-color: #7b1fa2; }
    .k-section.tense-red { background: #fce4ec; border-color: #c62828; }
    .k-section.tense-green { background: #e8f5e9; border-color: #388e3c; }
    .k-section.tense-blue { background: #e3f2fd; border-color: #1565c0; }
    .k-section.tense-purple { background: #f3e5f5; border-color: #7b1fa2; }
    .k-title {
      font-weight: bold; font-size: 12px; margin-bottom: 4px;
    }
    .k-title .k-icon { margin-right: 4px; }
    .k-row { font-size: 11px; color: #444; margin: 2px 0; }
    .k-row .k-label { font-size: 10px; }
    .k-row.k-ex {
      font-style: italic; color: #555; font-size: 10px;
      margin: 0 0 4px 18px;
    }
    .k-row.k-ex b { color: #000; font-style: normal; }
    .k-formula { 
      font-family: monospace; font-size: 10px; color: #666;
      background: rgba(0,0,0,0.06); padding: 1px 4px; border-radius: 3px;
    }
    .k-example {
      font-style: italic; color: #555; font-size: 10px;
    }
    .k-example b { color: #000; font-style: normal; }
    .k-divider { font-size: 10px; color: #999; margin: 6px 0 4px; font-weight: bold; }
  </style>
</head>
<body>
  <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom: 8px;">
    <h3 style="margin:0;">Kho Từ Vựng</h3>
    <div>
      <button id="knowledgeBtn">📚 Kiến thức</button>
      <button id="clearBtn">Xóa tất cả</button>
    </div>
  </div>

  <div id="knowledgePanel" class="knowledge-panel"></div>

  <div id="vocabContainer"></div>
  <script src="knowledge.js"></script>
  <script src="popup.js"></script>
</body>
</html>
